[build]
  command = "pip install -r requirements.txt"
  functions = "functions"
  publish = "."

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "Backend/uploads/*"

[functions]
  node_bundler = "esbuild"

[functions.api]
  runtime = "python"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true
